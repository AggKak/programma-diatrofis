<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το Πλάνο Μου</title>
    <style>
        /* CSS: Εδώ ορίζουμε την εμφάνιση */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .meal-item { background: #f9f9f9; padding: 10px; border-left: 5px solid #28a745; margin-top: 10px; display: flex; justify-content: space-between; }
        .day-label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍴 Προγραμματιστής Γευμάτων</h2>
    
    <input type="text" id="recipeInput" placeholder="Τι θα φάμε;">
    <select id="dayInput">
        <option value="Δευτέρα">Δευτέρα</option>
        <option value="Τρίτη">Τρίτη</option>
        <option value="Τετάρτη">Τετάρτη</option>
        <option value="Πέμπτη">Πέμπτη</option>
        <option value="Παρασκευή">Παρασκευή</option>
        <option value="Σάββατο">Σάββατο</option>
        <option value="Κυριακή">Κυριακή</option>
    </select>
    <button onclick="addMeal()">Προσθήκη στο Πρόγραμμα</button>

    <div id="plannerList">
        <h3>Το πλάνο της εβδομάδας:</h3>
        </div>
</div>

<script>
    // JavaScript: Εδώ ορίζουμε τη λειτουργία
    function addMeal() {
        const recipe = document.getElementById('recipeInput').value;
        const day = document.getElementById('dayInput').value;
        const list = document.getElementById('plannerList');

        if (recipe === "") {
            alert("Παρακαλώ γράψε μια συνταγή!");
            return;
        }

        // Δημιουργία του στοιχείου στη λίστα
        const div = document.createElement('div');
        div.className = 'meal-item';
        div.innerHTML = `<span class="day-label">${day}:</span> <span>${recipe}</span>`;
        
        list.appendChild(div);

        // Καθαρισμός του πεδίου
        document.getElementById('recipeInput').value = "";
    }
</script>

</body>
</html>
